<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>वारी सहाय्य · मदत नकाशा</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./assets/css/map.css" />
</head>
<body>
  <div id="map"></div>
  <div class="topbar">
    <div class="panel collapsed" id="panel">
      <div class="phead">
        <div class="pinfo">
          <div class="title">वारी सहाय्य · मदत नकाशा</div>
          <div class="sub"><span id="count">0</span> मदत केंद्रे · <span id="locStatus">GPS सुरू नाही</span></div>
        </div>
        <button class="ptoggle" id="ptoggle" onclick="togglePanel()" aria-expanded="false">नियंत्रण ▾</button>
      </div>
      <div class="panel-body" id="panelBody">
        <div class="filter-title">नकाशा नियंत्रण</div>
        <div class="chips"><button class="chip loc-chip" onclick="locateMe()">📍 माझे स्थान दाखवा</button><button class="chip" onclick="resetMap(false)">🗺 सर्व points</button></div>
        <div class="filter-title">पालखी</div>
        <div class="chips" id="palkhiChips">
          <button class="chip active" data-palkhi="all">दोन्ही पालख्या</button>
          <button class="chip" data-palkhi="dnyaneshwar">श्री संत ज्ञानेश्वर महाराज</button>
          <button class="chip" data-palkhi="tukaram">जगद्गुरू श्री संत तुकाराम महाराज</button>
        </div>
        <div class="filter-title">मदत प्रकार</div>
        <div class="chips" id="typeChips">
          <button class="chip active" data-filter="all">सर्व</button>
          <button class="chip" data-filter="ambulance">🚑 रुग्णवाहिका</button>
          <button class="chip" data-filter="health">🏥 आरोग्य</button>
          <button class="chip" data-filter="halt">⛺ मुक्काम</button>
          <button class="chip" data-filter="water">💧 पाणी टँकर</button>
          <button class="chip" data-filter="hirkani">🤱 हिरकणी कक्ष</button>
          <button class="chip" data-filter="phc">🩺 प्रा. आ. केंद्र</button>
          <button class="chip" data-filter="ruralhospital">🏥 ग्रामीण रुग्णालय</button>
          <button class="chip" data-filter="hbt">🏩 HBT दवाखाना</button>
          <button class="chip" data-filter="doctors">🧑‍⚕️ सर्व डॉक्टर</button>
          <button class="chip" data-filter="privatehospital">🏨 खाजगी रुग्णालय</button>        </div>
        <div class="chips docsub" id="ambsubChips" style="display:none">
          <span class="docsub-label">रुग्णवाहिका प्रकार:</span>
          <button class="chip active" data-amb="all">सर्व</button>
          <button class="chip" data-amb="als">ALS प्रगत</button>
          <button class="chip" data-amb="bls">BLS मूलभूत</button>
          <button class="chip" data-amb="102">१०२</button>
          <button class="chip" data-amb="108">१०८</button>
        </div>
        <div class="chips docsub" id="docsubChips" style="display:none">
          <span class="docsub-label">डॉक्टर प्रकार:</span>
          <button class="chip active" data-doc="all">सर्व</button>
          <button class="chip" data-doc="ems">EMS तज्ञ</button>
          <button class="chip" data-doc="mo">वैद्यकीय अधिकारी (MO)</button>
        </div>
      </div>
    </div>
    <div class="legend"><button class="legend-btn" data-filter="all" onclick="setType('all')">🗺 सर्व</button><button class="legend-btn" data-filter="ambulance" onclick="setType('ambulance')">🚑 रुग्णवाहिका</button><button class="legend-btn" data-filter="doctors" onclick="setType('doctors')">🩺 डॉक्टर</button><button class="legend-btn" data-filter="health" onclick="setType('health')">🏥 आरोग्य</button><button class="legend-btn" data-filter="halt" onclick="setType('halt')">⛺ मुक्काम</button><button class="legend-btn" data-filter="water" onclick="setType('water')">💧 पाणी</button><button class="legend-btn" data-filter="hirkani" onclick="setType('hirkani')">🤱 हिरकणी</button><button class="legend-btn loc-btn" onclick="locateMe()">📍 माझे स्थान</button></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./wari-points-1.js"></script>
  <script src="./wari-points-2.js"></script>
  <script src="./wari-points-3.js"></script>
  <script src="./wari-points-4.js"></script>
  <script src="./wari-points-5.js"></script>
  <script src="./wari-points-tukaram.js"></script>
  <script src="./wari-points-dnyaneshwar-halts.js"></script>
  <script src="./wari-route-dnyaneshwar-pune.js"></script>
  <script src="./wari-points-tukaram-halts.js"></script>
  <script src="./wari-points-satara.js"></script>
  <script src="./wari-points-hirkani.js"></script>
  <script src="./wari-points-private.js"></script>
  <script src="./wari-points-solapur.js"></script>
  <script src="./wari-points-water-solapur.js"></script>
  <script src="./wari-data.js"></script>
  <script src="./assets/js/map.js"></script>
</body>
</html>
