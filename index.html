<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>वारी सहाय्य</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#f27405" />
  <style>
    :root{--orange:#f27405;--ink:#23160d;--shadow:0 22px 55px rgba(42,24,8,.18)}
    *{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;background:radial-gradient(circle at top,#fff7df,#e7d7bb);font-family:system-ui,'Noto Sans Devanagari',Arial,sans-serif;color:var(--ink)}iframe{border:0;display:block}.mobile-frame{display:block;width:100%;height:100dvh;min-height:100vh}.desktop-shell{display:none}
    @media (min-width:900px){body{overflow:hidden}.mobile-frame{display:none}.desktop-shell{display:grid;grid-template-columns:470px 1fr;gap:22px;height:100dvh;padding:18px;max-width:1500px;margin:0 auto}.phone-wrap{height:calc(100dvh - 36px);border-radius:30px;overflow:hidden;background:#fff8e8;box-shadow:var(--shadow)}.phone-wrap iframe{width:100%;height:100%}.map-wrap{height:calc(100dvh - 36px);display:grid;grid-template-rows:auto 1fr;border-radius:30px;overflow:hidden;background:#fff8e8;box-shadow:var(--shadow)}.desktop-head{padding:18px 20px;background:linear-gradient(135deg,#f78400,#ef7000);color:white}.desktop-head h1{margin:0;font-size:26px;line-height:1.1;font-weight:950}.desktop-head p{margin:6px 0 14px;font-weight:800;opacity:.92}.desk-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}.desk-btn{border:0;border-radius:18px;background:white;color:#9a3a00;padding:15px 16px;font-weight:950;font-size:17px;text-align:left;box-shadow:0 12px 24px rgba(82,43,5,.18);cursor:pointer}.desk-btn span{display:block;font-size:12px;color:#806f5a;margin-top:3px}.map-frame{width:100%;height:100%;background:#eadfc8}}
  </style>
</head>
<body>
  <iframe class="mobile-frame" src="./app.html?v=osm5" title="वारी सहाय्य" allow="geolocation; clipboard-write; web-share"></iframe>

  <main class="desktop-shell">
    <section class="phone-wrap">
      <iframe id="appFrame" src="./app.html?v=osm5" title="वारी सहाय्य मोबाइल UI" allow="geolocation; clipboard-write; web-share"></iframe>
    </section>
    <section class="map-wrap">
      <div class="desktop-head">
        <h1>वारी सहाय्य · OpenStreetMap</h1>
        <p>श्री संत ज्ञानेश्वर महाराज आणि जगद्गुरू श्री संत तुकाराम महाराज पालखी मार्गासाठी आमचे मदत केंद्र.</p>
        <div class="desk-actions">
          <button class="desk-btn" onclick="callApp('locateMe')">📍 माझ्या जवळ मदत शोधा<span>GPS वापरून जवळची मदत app मध्ये दाखवा</span></button>
          <button class="desk-btn" onclick="callApp('openMapPanel')">🗺 नकाशा दाखवा<span>OpenStreetMap वर मदत केंद्र पाहा</span></button>
        </div>
      </div>
      <!-- Google My Map is intentionally disabled for now. Kept for later reference: https://www.google.com/maps/d/u/0/embed?mid=1151dFIqz_htDjnDRMRnDqnJQE9JW3VQ -->
      <iframe id="osmFrame" class="map-frame" src="./map.html?v=osm5" title="वारी सहाय्य OpenStreetMap" allow="geolocation; clipboard-write; web-share" loading="lazy"></iframe>
    </section>
  </main>

  <script>
    function injectExtraPoints(frame){
      try{
        var doc=frame.contentDocument || frame.contentWindow.document;
        if(!doc || !doc.head || !doc.body || doc.body.dataset.extraWariPointsReady==='yes') return;
        doc.body.dataset.extraWariPointsReady='loading';
        var pending=3;
        function done(){
          pending--;
          if(pending>0) return;
          var sc=doc.createElement('script');
          sc.textContent="(function(){try{if(window.__extraWariPointsAdded||typeof POINTS==='undefined')return;window.__extraWariPointsAdded=true;function norm(x,def){return {palkhi:x.p||def||'dnyaneshwar',type:x.type||'',label:x.label||'',place:x.place||'',base:x.base||'',vehicle:x.vehicle||'',mems:x.mems||'',call:x.call||'',doctor:x.doctor||'',pilot:x.pilot||'',lat:+x.lat,lng:+x.lng,ready:x.ready||'verify',date:x.date||'',phase:x.phase||''};}function isOldHalt(p){var s=[p.type,p.label,p.place,p.mems,p.phase].join(' ').toLowerCase();return /halt|mukkam|मुक्काम|विश्रांती|arrival|rest day|route stretch/.test(s);}var extra=[];(window.WARI_DNYANESHWAR_HALT_POINTS||[]).forEach(function(x){extra.push(norm(x,'dnyaneshwar'));});(window.WARI_TUKARAM_HALT_POINTS||[]).forEach(function(x){extra.push(norm(x,'tukaram'));});(window.WARI_SATARA_POINTS||[]).forEach(function(x){extra.push(norm(x,'dnyaneshwar'));});POINTS=POINTS.filter(function(p){return !isOldHalt(p);});POINTS.push.apply(POINTS,extra.filter(function(p){return isFinite(p.lat)&&isFinite(p.lng);}));if(typeof refresh==='function')refresh();if(typeof fitMappedArea==='function')setTimeout(fitMappedArea,150);}catch(e){console.warn('Extra Wari points add failed',e);}})();";
          doc.body.appendChild(sc);
          doc.body.dataset.extraWariPointsReady='yes';
        }
        ['./wari-points-dnyaneshwar-halts.js?v=osm5','./wari-points-tukaram-halts.js?v=osm5','./wari-points-satara.js?v=osm5'].forEach(function(src){
          var s=doc.createElement('script');
          s.src=src;
          s.onload=done;
          s.onerror=done;
          doc.head.appendChild(s);
        });
      }catch(e){console.warn('Unable to inject extra Wari points', e);}
    }

    function installFrame(frame){
      function run(){injectExtraPoints(frame);}
      frame.addEventListener('load',run);
      setTimeout(run,400);
      setTimeout(run,1600);
    }
    document.querySelectorAll('iframe').forEach(installFrame);

    function callApp(fn){
      var frame=document.getElementById('appFrame');
      if(!frame || !frame.contentWindow) return;
      try{
        injectExtraPoints(frame);
        if(typeof frame.contentWindow[fn]==='function') frame.contentWindow[fn]();
        frame.focus();
      }catch(e){console.warn('Unable to call app function', e);}
    }

    function forceOpenStreetMap(){
      document.querySelectorAll('iframe').forEach(function(frame){
        var src=frame.getAttribute('src')||'';
        if(src.indexOf('google.com/maps')>-1 || src.indexOf('maps/d/u')>-1){
          frame.setAttribute('src','./map.html?v=osm5');
          frame.setAttribute('title','वारी सहाय्य OpenStreetMap');
        }
      });
    }
    forceOpenStreetMap();
    setTimeout(forceOpenStreetMap,500);
    setTimeout(forceOpenStreetMap,1500);

    function registerOfflineSupport(){
      if(!('serviceWorker' in navigator)) return;
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('./sw.js?v=osm5').then(function(reg){
          function syncNow(){
            if(reg.update) reg.update();
            if(navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'SYNC_NOW'});}
          }
          if(navigator.onLine) syncNow();
          window.addEventListener('online', syncNow);
        }).catch(function(e){console.warn('Offline support not installed', e);});
      });
    }
    registerOfflineSupport();
  </script>
</body>
</html>
