<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>वारी सहाय्य · मदत नकाशा</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{--orange:#f27405;--cream:#f3ead8;--ink:#23160d;--muted:#7a6d5c;--red:#e52920;--black:#2a2018;--green:#1f9d63;--blue:#2f6fd6;--card:#fffef9;--line:#eee2cf;--shadow:0 18px 40px rgba(69,42,16,.16)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{background:var(--cream)}body{margin:0;font-family:system-ui,-apple-system,'Segoe UI','Noto Sans Devanagari',Arial,sans-serif;background:radial-gradient(circle at top,#fff7df 0,#efe4cf 42%,#e5d8c0 100%);color:var(--ink)}.page{min-height:100dvh;max-width:470px;margin:0 auto;background:linear-gradient(180deg,#fff8e8 0,#f6ecd9 100%);box-shadow:0 30px 90px rgba(36,24,12,.22);overflow:hidden}.hero{background:linear-gradient(180deg,#f57900,#ef7000);color:white;border-radius:0 0 30px 30px;padding:12px 20px 22px;box-shadow:0 18px 30px rgba(242,116,5,.28)}.statusbar{display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:13px;margin-bottom:18px}.hero h1{font-size:32px;line-height:1;margin:0 0 7px;font-weight:950;letter-spacing:-.04em}.hero p{font-size:14px;margin:0;font-weight:800;opacity:.92}.palkhi-switch{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:16px}.palkhi-tab{border:1px solid rgba(255,255,255,.3);border-radius:999px;background:rgba(255,255,255,.16);color:white;padding:9px 6px;font-size:12px;font-weight:950}.palkhi-tab.active{background:white;color:#9a3a00}.section{padding:18px 18px 0}.kicker{font-size:13px;color:#9c7c51;font-weight:950;letter-spacing:.08em;margin:0 0 12px;text-transform:uppercase}.emergency-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.em-card{min-height:124px;border-radius:22px;padding:18px 12px;text-decoration:none;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;box-shadow:0 15px 28px rgba(70,40,18,.18);font-weight:950}.em-card.red{background:linear-gradient(145deg,#ef3127,#df1d18)}.em-card.dark{background:linear-gradient(145deg,#33261b,#1f1711)}.em-icon{font-size:24px}.em-num{font-size:34px}.em-label{font-size:13px;opacity:.92}.near-btn{width:100%;margin-top:15px;border:0;border-radius:20px;background:linear-gradient(135deg,#ff8a00,#ef7100);color:white;display:flex;align-items:center;gap:13px;padding:17px 18px;box-shadow:0 16px 28px rgba(242,116,5,.28);font-weight:950;text-align:left}.near-ico{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:23px}.near-btn b{display:block;font-size:19px}.near-btn span{display:block;font-size:12px;opacity:.88}.help-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.help-card{border:0;background:var(--card);border-radius:21px;padding:18px 10px;min-height:148px;text-align:center;box-shadow:0 14px 30px rgba(70,40,18,.13);color:var(--ink);font-weight:950;cursor:pointer}.help-card.active{outline:3px solid rgba(242,116,5,.45)}.help-icon{width:54px;height:54px;border-radius:18px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:27px}.bg-red{background:#ffe9e8;color:#e52920}.bg-green{background:#e9f8f0;color:#14824e}.bg-blue{background:#e9f1ff;color:#2f6fd6}.bg-amber{background:#fff4dc;color:#9b5b00}.help-title{font-size:19px;margin-bottom:2px}.help-sub{font-size:12px;color:var(--muted);font-weight:800}.count-pill{margin:10px auto 0;width:max-content;border-radius:999px;padding:5px 10px;background:#fff1ec;color:#d64026;font-size:12px;font-weight:950}.count-pill.green{background:#e7f8ef;color:#168452}.toolbar{padding:16px 18px 0}.search{width:100%;height:46px;border:1px solid var(--line);border-radius:16px;padding:0 14px;font-size:16px;background:#fffef9;font-weight:750}.chips{display:flex;gap:8px;overflow:auto;padding:10px 0 4px}.chip{border:1px solid var(--line);background:#fffef9;color:#4c3c2a;border-radius:999px;padding:9px 12px;font-weight:950;white-space:nowrap}.chip.active{background:#2a2018;color:white}.map-card{margin:14px 18px 0;background:white;border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.map-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:950}.map-head small{display:block;color:#7a6d5c;font-size:11px;font-weight:900}.map-actions{display:flex;gap:8px}.mini-btn{border:0;border-radius:999px;background:#fff3e5;color:#a44900;font-weight:950;padding:9px 11px}#map{height:255px;background:#eadfc8}.summary{display:flex;justify-content:space-between;gap:8px;padding:12px 18px 8px;color:#7a6d5c;font-size:13px;font-weight:850}.list{padding:0 18px 28px}.card{background:#fffef9;border:1px solid var(--line);border-left:7px solid #b9a68b;border-radius:20px;padding:13px;margin-top:10px;box-shadow:0 10px 24px rgba(69,42,16,.1)}.card.ambulance{border-left-color:#e52920}.card.health{border-left-color:#1f9d63}.card.halt{border-left-color:#9b5b00}.card.water{border-left-color:#2f8fcf}.ctop{display:flex;gap:10px}.ico{font-size:24px;width:34px}.title{font-weight:950;font-size:15px;line-height:1.25;flex:1}.dist{background:#f3ead8;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:950;height:max-content;white-space:nowrap}.near{background:#e52920;color:white}.badges{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}.badge{font-size:11px;font-weight:950;border-radius:999px;padding:4px 8px;background:#f3ead8;color:#5a4430}.badge.ok{background:#e5f7ec;color:#168452}.badge.warn{background:#ffe9e8;color:#b51d18}.meta{font-size:13px;color:#5b4a37;line-height:1.42;margin-top:9px}.meta b{color:#24170c}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}.actions a,.actions button{border:0;border-radius:13px;padding:10px 6px;text-align:center;text-decoration:none;font-weight:950;background:#f4ecd9;color:#24170c}.call{background:#159653!important;color:white!important}.dir{background:#2f6fd6!important;color:white!important}.share{background:#fff3e5!important;color:#a44900!important;border:1px solid #ffd8a8!important}.modal{display:none;position:fixed;inset:0;background:rgba(35,22,13,.55);z-index:999;align-items:end}.modal.open{display:flex}.modal-card{width:100%;max-width:470px;margin:0 auto;background:#fffef9;border-radius:24px 24px 0 0;padding:18px}.field{width:100%;height:46px;border:1px solid var(--line);border-radius:14px;padding:0 12px;font-size:16px;margin:8px 0;background:white}.pin{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;border:2px solid white;box-shadow:0 2px 9px rgba(0,0,0,.32)}.pin.ambulance{background:#e52920}.pin.health{background:#1f9d63}.pin.halt{background:#9b5b00}.pin.water{background:#2f8fcf}.pin.other{background:#2f6fd6}.user-pin{background:#111827;border:3px solid white;width:22px;height:22px;border-radius:50%;box-shadow:0 0 0 7px rgba(47,111,214,.25)}@media(min-width:900px){.page{max-width:1120px;border-radius:0;display:grid;grid-template-columns:420px 1fr;min-height:100dvh}.hero,.section,.toolbar{grid-column:1}.map-card,.summary,.list{grid-column:2}.map-card{margin-top:20px}#map{height:58vh}.list{max-height:36vh;overflow:auto}}
  </style>
</head>
<body>
<div class="page">
  <header class="hero"><div class="statusbar"><span id="clock">6:24</span><span>ऑफलाइन तयार ▭</span></div><h1>वारी सहाय्य</h1><p>दोन्ही पालख्यांसाठी जवळची मदत, एका टॅपवर</p><div class="palkhi-switch" id="palkhiSwitch"><button class="palkhi-tab active" data-p="all" onclick="setPalkhi('all')">दोन्ही</button><button class="palkhi-tab" data-p="dnyaneshwar" onclick="setPalkhi('dnyaneshwar')">ज्ञानेश्वर माऊली</button><button class="palkhi-tab" data-p="tukaram" onclick="setPalkhi('tukaram')">तुकाराम महाराज</button></div></header>
  <section class="section"><p class="kicker">तातडीची मदत · EMERGENCY</p><div class="emergency-grid"><a class="em-card red" href="tel:108"><span class="em-icon">🚑</span><span class="em-num">१०८</span><span class="em-label">रुग्णवाहिका</span></a><a class="em-card dark" href="tel:112"><span class="em-icon">🛡️</span><span class="em-num">११२</span><span class="em-label">आपत्कालीन</span></a></div><button class="near-btn" onclick="locateMe()"><span class="near-ico">📍</span><span><b>माझ्या जवळ मदत शोधा</b><span>Find help nearest to me</span></span></button></section>
  <section class="section"><p class="kicker">कशाची गरज आहे? · CHOOSE HELP</p><div class="help-grid"><button class="help-card" data-cat="ambulance" onclick="chooseHelp('ambulance')"><div class="help-icon bg-red">🚑</div><div class="help-title">रुग्णवाहिका</div><div class="help-sub">Ambulance</div><div id="countAmb" class="count-pill">0 जवळ</div></button><button class="help-card" data-cat="doctor" onclick="chooseHelp('doctor')"><div class="help-icon bg-green">🧑‍⚕️</div><div class="help-title">डॉक्टर</div><div class="help-sub">Doctor / PHC</div><div id="countDoc" class="count-pill green">0 जवळ</div></button><button class="help-card" data-cat="hospital" onclick="chooseHelp('hospital')"><div class="help-icon bg-blue">🏥</div><div class="help-title">रुग्णालय</div><div class="help-sub">Hospital</div><div id="countHosp" class="count-pill green">0 जवळ</div></button><button class="help-card" data-cat="halt" onclick="chooseHelp('halt')"><div class="help-icon bg-amber">⛺</div><div class="help-title">मुक्काम</div><div class="help-sub">Mukkam</div><div id="countHalt" class="count-pill">0 जवळ</div></button></div></section>
  <div class="toolbar"><input id="search" class="search" placeholder="ठिकाण, डॉक्टर, वाहन क्रमांक शोधा…" oninput="refresh()"><div class="chips" id="rads"><button class="chip" data-r="100" onclick="setRadius(100)">१०० मी.</button><button class="chip active" data-r="500" onclick="setRadius(500)">५०० मी.</button><button class="chip" data-r="1000" onclick="setRadius(1000)">१ किमी</button><button class="chip" data-r="5000" onclick="setRadius(5000)">५ किमी</button><button class="chip" data-r="99999999" onclick="setRadius(99999999)">सर्व</button></div></div>
  <section class="map-card" id="mapPanel"><div class="map-head"><span>मदत नकाशा<small id="palkhiTitle">दोन्ही पालख्या</small></span><div class="map-actions"><button class="mini-btn" onclick="showMappedArea()">🗺 मार्गावर परत</button><button class="mini-btn" onclick="openRoute()">पालखी मार्ग</button></div></div><div id="map"></div></section>
  <div class="summary"><span><b id="count">0</b> मदत केंद्रे</span><span id="gps">GPS सुरू नाही</span></div><div id="list" class="list"></div>
</div>
<div id="modal" class="modal" onclick="closeModal(event)"><div class="modal-card"><h2>स्थान शेअर करा / मदत मागा</h2><input id="dindi" class="field" placeholder="दिंडी क्रमांक / नाव / मोबाईल संदर्भ"><select id="issue" class="field"><option>वैद्यकीय आपत्कालीन मदत</option><option>रुग्णवाहिका हवी</option><option>पाणी हवे</option><option>व्यक्ती हरवली</option><option>इतर मदत</option></select><div class="actions"><button onclick="closeModal()">रद्द करा</button><button class="call" onclick="shareCurrentLocation()">शेअर करा</button></div></div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="./wari-points-1.js"></script><script src="./wari-points-2.js"></script><script src="./wari-points-3.js"></script><script src="./wari-points-4.js"></script><script src="./wari-points-5.js"></script><script src="./wari-points-tukaram.js"></script>
<script>
const MASTER_MAP_URL='https://www.google.com/maps/d/u/0/viewer?mid=1tI_g2pw9S8fsQ4Wfz3kPau3dbGotSuw';
const rawDnyaneshwar=JSON.parse((window.WARI_POINT_CHUNKS||[]).join('')).map(x=>({p:'dnyaneshwar',t:x.type,l:x.label,pl:x.place,b:x.base,v:x.vehicle,m:x.mems,c:x.call,d:x.doctor,pi:x.pilot,lat:x.lat,lng:x.lng,r:x.ready,dt:x.date||'',ph:x.phase||''}));
const rawTukaram=window.WARI_TUKARAM_POINTS||[];
const POINTS=[...rawDnyaneshwar,...rawTukaram].map(x=>({palkhi:x.p||'dnyaneshwar',type:x.t||'',label:x.l||'',place:x.pl||'',base:x.b||'',vehicle:x.v||'',mems:x.m||'',call:x.c||'',doctor:x.d||'',pilot:x.pi||'',lat:+x.lat,lng:+x.lng,ready:x.r||'',date:x.dt||'',phase:x.ph||''}));
let map,userLocation=null,userMarker=null,markers=[],cat='all',rad=500,currentPalkhi='all',selectedPoint=null;const $=id=>document.getElementById(id);const palkhiNames={all:'दोन्ही पालख्या',dnyaneshwar:'संत ज्ञानेश्वर महाराज पालखी',tukaram:'संत तुकाराम महाराज पालखी'};
function tick(){const d=new Date();$('clock').textContent=d.toLocaleTimeString('mr-IN',{hour:'numeric',minute:'2-digit'});}tick();setInterval(tick,30000);
function icon(p){let t=(p.type||'').toLowerCase();return t.includes('ambulance')?'🚑':t.includes('hospital')||t.includes('rural')?'🏥':t.includes('phc')||t.includes('hbt')?'🩺':t.includes('water')?'💧':t.includes('halt')||t.includes('mukkam')?'⛺':'📍'}
function cls(p){let t=(p.type||'').toLowerCase();return t.includes('ambulance')?'ambulance':t.includes('hospital')||t.includes('phc')||t.includes('hbt')||t.includes('rural')?'health':t.includes('halt')||t.includes('mukkam')?'halt':t.includes('water')?'water':'other'}
function hav(a,b,c,d){let R=6371000,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b),q=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;return 2*R*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}function fd(m){return m==null?'—':m<1000?Math.round(m)+' मी.':(m/1000).toFixed(1)+' किमी'}function tel(s){return(s||'').replace(/[^0-9+]/g,'')}function esc(s){return(s||'').toString().replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]))}function openRoute(){window.open(MASTER_MAP_URL,'_blank')}
function setPalkhi(p){currentPalkhi=p;document.querySelectorAll('#palkhiSwitch .palkhi-tab').forEach(b=>b.classList.toggle('active',b.dataset.p===p));$('palkhiTitle').textContent=palkhiNames[p]||'दोन्ही पालख्या';refresh();fitMappedArea();}
function chooseHelp(c){cat=c;document.querySelectorAll('.help-card').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));refresh();document.getElementById('mapPanel').scrollIntoView({behavior:'smooth',block:'start'});}function setRadius(r){rad=r;document.querySelectorAll('#rads .chip').forEach(b=>b.classList.toggle('active',+b.dataset.r===r));refresh()}
function showMappedArea(){cat='all';rad=99999999;$('search').value='';document.querySelectorAll('.help-card').forEach(b=>b.classList.remove('active'));document.querySelectorAll('#rads .chip').forEach(b=>b.classList.toggle('active',+b.dataset.r===99999999));refresh();fitMappedArea();}
function inPalkhi(p){return currentPalkhi==='all'||p.palkhi===currentPalkhi}function fitMappedArea(){const valid=POINTS.filter(p=>inPalkhi(p)&&isFinite(p.lat)&&isFinite(p.lng)).map(p=>[p.lat,p.lng]);if(valid.length){map.fitBounds(L.latLngBounds(valid).pad(0.12))}}
function inCat(p,c=cat){let t=(p.type||'').toLowerCase();return c==='all'||(c==='ambulance'&&t.includes('ambulance'))||(c==='doctor'&&(t.includes('phc')||t.includes('hbt')))||(c==='hospital'&&(t.includes('hospital')||t.includes('rural')))||(c==='water'&&t.includes('water'))||(c==='halt'&&(t.includes('halt')||t.includes('mukkam')))}
function d(p){return userLocation?hav(userLocation[0],userLocation[1],p.lat,p.lng):null}function dir(p){return`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`}function search(p){let q=$('search').value.trim().toLowerCase();return!q||[p.label,p.type,p.place,p.vehicle,p.doctor,p.pilot,p.base,p.phase,p.date].join(' ').toLowerCase().includes(q)}
function visible(forCat=cat){let pts=POINTS.filter(p=>inPalkhi(p)&&inCat(p,forCat)&&search(p)).map((p,i)=>({...p,_idx:POINTS.indexOf(p),dist:d(p)}));if(userLocation&&rad<99999999)pts=pts.filter(p=>p.dist!=null&&p.dist<=rad);pts.sort((a,b)=>userLocation?(a.dist??9e9)-(b.dist??9e9):(a.palkhi||'').localeCompare(b.palkhi||'')||(a.type||'').localeCompare(b.type||'')||(a.label||'').localeCompare(b.label||''));return pts}
function updateHelpCounts(){const near=userLocation?' जवळ':' एकूण';$('countAmb').textContent=visible('ambulance').length+near;$('countDoc').textContent=visible('doctor').length+near;$('countHosp').textContent=visible('hospital').length+near;$('countHalt').textContent=visible('halt').length+near;}
function pop(p){let c=tel(p.call),m=[];if(p.vehicle)m.push(`<b>वाहन क्रमांक:</b> ${esc(p.vehicle)}`);if(p.doctor)m.push(`<b>डॉक्टर/EMSO:</b> ${esc(p.doctor)}`);if(p.place)m.push(`<b>ठिकाण:</b> ${esc(p.place)}`);if(p.phase)m.push(`<b>टप्पा:</b> ${esc(p.phase)}`);return`<b>${icon(p)} ${esc(p.label)}</b><br><small>${esc(palkhiNames[p.palkhi]||'')}</small><br>${m.join('<br>')}<br>${c?`<a href="tel:${c}">फोन करा</a> `:''}<a target="_blank" href="${dir(p)}">दिशा</a>`}
function draw(pts){markers.forEach(m=>map.removeLayer(m));markers=[];pts.forEach(p=>{let m=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',html:`<div class="pin ${cls(p)}">${icon(p)}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map).bindPopup(pop(p));markers.push(m)})}
function line(l,v){return v?`<div><b>${l}</b> ${esc(v)}</div>`:''}
function render(pts){let list=$('list');if(!pts.length){list.innerHTML='<div class="card">या फिल्टरमध्ये कोणतेही मदत केंद्र सापडले नाही.</div>';return}list.innerHTML=pts.slice(0,80).map(p=>{let c=tel(p.call),near=p.dist!=null&&p.dist<=100,verify=p.ready==='verify';return`<article class="card ${cls(p)}"><div class="ctop"><div class="ico">${icon(p)}</div><div class="title">${esc(p.label)}<div class="badges"><span class="badge">${p.palkhi==='tukaram'?'तुकाराम':'ज्ञानेश्वर'}</span><span class="badge ${verify?'warn':'ok'}">${verify?'पडताळणी आवश्यक':'सार्वजनिक तयार'}</span>${p.mems?`<span class="badge">${esc(p.mems)}</span>`:''}</div></div><div class="dist ${near?'near':''}">${fd(p.dist)}</div></div><div class="meta">${line('ठिकाण:',p.place)}${line('वाहन क्रमांक:',p.vehicle)}${line('डॉक्टर/EMSO:',p.doctor)}${line('बेस:',p.base)}${line('पायलट/EA:',p.pilot)}${line('तारीख:',p.date)}${line('टप्पा:',p.phase)}</div><div class="actions">${c?`<a class="call" href="tel:${c}">📞 फोन करा</a>`:`<button>📞 नंबर नाही</button>`}<a class="dir" target="_blank" href="${dir(p)}">🧭 दिशा</a><button class="share" onclick="openShare(${p._idx})">📤 शेअर</button></div></article>`}).join('')}
function refresh(){let pts=visible();$('count').textContent=pts.length;$('gps').textContent=userLocation?'अंतरानुसार क्रम':'GPS सुरू नाही';draw(pts.slice(0,140));render(pts);updateHelpCounts();}
function locateMe(){if(!navigator.geolocation){$('gps').textContent='स्थान सुविधा उपलब्ध नाही';return}$('gps').textContent='GPS स्थान घेत आहोत…';navigator.geolocation.getCurrentPosition(pos=>{userLocation=[pos.coords.latitude,pos.coords.longitude];if(userMarker)map.removeLayer(userMarker);userMarker=L.marker(userLocation,{icon:L.divIcon({className:'',html:'<div class="user-pin"></div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map).bindPopup('आपण येथे आहात').openPopup();map.setView(userLocation,16);$('gps').textContent=`अचूकता ${Math.round(pos.coords.accuracy)} मी.`;refresh();document.getElementById('mapPanel').scrollIntoView({behavior:'smooth',block:'start'});},()=>{$('gps').textContent='GPS मिळाले नाही. Location permission द्या.'},{enableHighAccuracy:true,timeout:15000,maximumAge:20000})}
function openShare(i){selectedPoint=POINTS[i]?.label||null;$('modal').classList.add('open')}function closeModal(e){if(!e||e.target.id==='modal'||e.target.textContent==='रद्द करा')$('modal').classList.remove('open')}
function shareCurrentLocation(){let d=$('dindi').value.trim(),issue=$('issue').value,loc=userLocation?`https://www.google.com/maps/search/?api=1&query=${userLocation[0]},${userLocation[1]}`:'स्थान उपलब्ध नाही',msg=`वारी मदत विनंती%0A${encodeURIComponent(issue)}%0A${d?encodeURIComponent('दिंडी/नाव: '+d)+'%0A':''}${selectedPoint?encodeURIComponent('जवळचे मदत केंद्र: '+selectedPoint)+'%0A':''}${encodeURIComponent('माझे स्थान: ')}${encodeURIComponent(loc)}`;if(navigator.share)navigator.share({title:'वारी मदत विनंती',text:decodeURIComponent(msg.replaceAll('%0A','\n'))}).catch(()=>{});else window.open('https://wa.me/?text='+msg,'_blank');closeModal()}
function init(){map=L.map('map',{zoomControl:false}).setView([18.4193602268,74.02765555],10);L.control.zoom({position:'bottomleft'}).addTo(map);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);refresh();setTimeout(fitMappedArea,250)}init();
</script>
