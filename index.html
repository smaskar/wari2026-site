<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7c1d1d" />
  <title>वारी सहाय्य नकाशा</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{
      --brand:#7c1d1d; --brand2:#f97316; --safe:#15803d; --danger:#dc2626; --info:#2563eb;
      --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#fff7ed; --card:#ffffff;
      --shadow:0 10px 30px rgba(15,23,42,.12); --radius:20px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Devanagari",Arial,sans-serif;background:var(--bg);color:var(--ink)}
    body{overflow:hidden}
    .app{height:100dvh;display:grid;grid-template-rows:auto auto 1fr auto;background:linear-gradient(180deg,#fff7ed 0,#fff 48%)}
    .top{padding:10px 12px 8px;background:linear-gradient(135deg,var(--brand),#991b1b 55%,#ea580c);color:#fff;box-shadow:0 3px 18px rgba(124,29,29,.28);z-index:30}
    .top-row{display:flex;align-items:center;gap:9px;justify-content:space-between}.title{min-width:0}.title h1{font-size:18px;line-height:1.05;margin:0;font-weight:900;letter-spacing:-.02em}.title p{margin:3px 0 0;font-size:12px;opacity:.94;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pill{border:1px solid rgba(255,255,255,.38);border-radius:999px;padding:6px 9px;font-size:11px;font-weight:800;background:rgba(255,255,255,.14)}
    .emergency{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px;padding:9px 12px;background:#fff;z-index:25;box-shadow:0 4px 18px rgba(15,23,42,.08)}
    .btn{border:0;border-radius:16px;padding:12px 10px;font-weight:900;font-size:15px;line-height:1.1;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;min-height:46px;box-shadow:0 4px 12px rgba(15,23,42,.08);cursor:pointer;color:#0f172a;background:#f1f5f9}.btn:active{transform:scale(.98)}.btn-danger{background:var(--danger);color:white}.btn-green{background:var(--safe);color:white}.btn-blue{background:var(--info);color:white}.btn-white{background:#fff;color:var(--ink);border:1px solid var(--line)}
    .map-wrap{position:relative;min-height:0}.map{height:100%;width:100%;background:#e2e8f0}.locate{position:absolute;right:12px;bottom:12px;z-index:20;border:0;border-radius:999px;background:#fff;color:var(--ink);box-shadow:var(--shadow);padding:12px 14px;font-size:16px;font-weight:900}.status-chip{position:absolute;left:12px;right:80px;bottom:12px;z-index:20;background:rgba(255,255,255,.95);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:9px 10px;font-size:12px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sheet{background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -16px 40px rgba(15,23,42,.16);z-index:40;max-height:50dvh;display:grid;grid-template-rows:auto auto 1fr;transition:max-height .22s ease}.sheet.expanded{max-height:78dvh}.grab{width:46px;height:5px;border-radius:20px;background:#cbd5e1;margin:8px auto 6px}.tools{padding:0 12px 8px}.search{width:100%;height:44px;border:1px solid var(--line);border-radius:15px;padding:0 12px;font-size:16px;font-weight:650;outline:none;background:#f8fafc}.chips{display:flex;gap:8px;overflow-x:auto;padding:9px 0 1px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:900;white-space:nowrap;color:#334155}.chip.active{background:#7c1d1d;color:#fff;border-color:#7c1d1d}.chip.danger.active{background:#dc2626;border-color:#dc2626}.chip.green.active{background:#15803d;border-color:#15803d}.chip.blue.active{background:#2563eb;border-color:#2563eb}.summary{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 12px 9px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}.summary b{font-size:14px;color:var(--ink)}.list{overflow:auto;padding:10px 12px 18px;background:#f8fafc}.card{position:relative;background:#fff;border:1px solid #e5e7eb;border-left:7px solid #94a3b8;border-radius:20px;padding:13px;box-shadow:0 3px 14px rgba(15,23,42,.07);margin-bottom:10px}.card.ambulance{border-left-color:#dc2626}.card.health{border-left-color:#15803d}.card.halt{border-left-color:#92400e}.card.water{border-left-color:#0284c7}.card-top{display:flex;gap:9px;align-items:flex-start}.ico{flex:0 0 38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#fee2e2;font-size:22px}.card.health .ico{background:#dcfce7}.card.halt .ico{background:#fef3c7}.card.water .ico{background:#e0f2fe}.card-title{margin:0;font-size:15.5px;line-height:1.22;font-weight:950;letter-spacing:-.01em}.dist{margin-left:auto;background:#f1f5f9;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:950;white-space:nowrap;color:#0f172a}.near{background:#dc2626;color:#fff}.meta{margin:8px 0 0;font-size:13px;line-height:1.38;color:#475569}.meta strong{color:#0f172a}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.badge{font-size:11px;font-weight:900;border-radius:999px;padding:4px 7px;background:#f1f5f9;color:#334155}.badge.red{background:#fee2e2;color:#991b1b}.badge.green{background:#dcfce7;color:#166534}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:11px}.actions a,.actions button{border:0;text-decoration:none;border-radius:14px;padding:10px 6px;min-height:42px;font-size:13px;font-weight:950;text-align:center;display:flex;align-items:center;justify-content:center;color:#0f172a;background:#f1f5f9}.actions .call{background:#16a34a;color:#fff}.actions .dir{background:#2563eb;color:#fff}.actions .share{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.empty{padding:22px;text-align:center;color:#64748b}.small-note{font-size:11px;color:#64748b;margin-top:6px}.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:100;align-items:end}.modal.open{display:flex}.modal-card{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:17px 14px 24px;box-shadow:var(--shadow)}.modal h2{margin:0 0 8px;font-size:19px}.field{display:block;width:100%;height:46px;border:1px solid var(--line);border-radius:14px;padding:0 12px;font-size:16px;margin:8px 0;background:#f8fafc}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.leaflet-popup-content{font-family:system-ui,"Noto Sans Devanagari",Arial,sans-serif;font-size:14px;line-height:1.35}.pin{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;color:#fff;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);font-size:16px}.pin.ambulance{background:#dc2626}.pin.health{background:#15803d}.pin.halt{background:#92400e}.pin.water{background:#0284c7}.pin.other{background:#2563eb}.user-pin{background:#111827;color:#fff;border:3px solid #fff;width:22px;height:22px;border-radius:50%;box-shadow:0 0 0 7px rgba(37,99,235,.22)}
    @media(min-width:760px){body{overflow:auto}.app{max-width:1180px;margin:0 auto;height:100vh;grid-template-columns:1fr 420px;grid-template-rows:auto auto 1fr}.top,.emergency{grid-column:1/3}.map-wrap{grid-column:1;grid-row:3/5}.sheet{grid-column:2;grid-row:3/5;max-height:none;border-radius:0;box-shadow:-8px 0 28px rgba(15,23,42,.12)}.sheet.expanded{max-height:none}.grab{display:none}.list{padding-bottom:20px}.map{height:100%}}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="top-row">
      <div class="title">
        <h1>वारी सहाय्य नकाशा</h1>
        <p>जवळची रुग्णवाहिका, डॉक्टर, प्रा. आ. केंद्र आणि मुक्काम मदत शोधा</p>
      </div>
      <div class="pill">नियंत्रण कक्ष</div>
    </div>
  </header>
  <section class="emergency">
    <a class="btn btn-danger" href="tel:108">🚑 १०८ ला फोन</a>
    <a class="btn btn-green" href="tel:112">🆘 ११२</a>
    <button class="btn btn-blue" onclick="openRoute()">🗺 पालखी मार्ग</button>
  </section>
  <main class="map-wrap">
    <div id="map" class="map"></div>
    <div id="mapStatus" class="status-chip">📍 जवळची मदत शोधण्यासाठी टॅप करा</div>
    <button class="locate" onclick="locateMe()">📍 माझ्या जवळ</button>
  </main>
  <section id="sheet" class="sheet">
    <div class="grab" onclick="toggleSheet()"></div>
    <div class="tools">
      <input id="search" class="search" placeholder="ठिकाण, डॉक्टर, वाहन क्रमांक शोधा…" oninput="refresh()" />
      <div class="chips" id="categoryChips">
        <button class="chip active" data-cat="all" onclick="setCat('all')">सर्व</button>
        <button class="chip danger" data-cat="ambulance" onclick="setCat('ambulance')">🚑 रुग्णवाहिका</button>
        <button class="chip green" data-cat="doctor" onclick="setCat('doctor')">🩺 डॉक्टर / प्रा. आ. केंद्र</button>
        <button class="chip green" data-cat="hospital" onclick="setCat('hospital')">🏥 रुग्णालय</button>
        <button class="chip water" data-cat="water" onclick="setCat('water')">💧 पाणी</button>
        <button class="chip" data-cat="halt" onclick="setCat('halt')">⛺ मुक्काम</button>
      </div>
      <div class="chips" id="radiusChips">
        <button class="chip" data-radius="100" onclick="setRadius(100)">१०० मी.</button>
        <button class="chip active" data-radius="500" onclick="setRadius(500)">५०० मी.</button>
        <button class="chip" data-radius="1000" onclick="setRadius(1000)">१ किमी</button>
        <button class="chip" data-radius="5000" onclick="setRadius(5000)">५ किमी</button>
        <button class="chip" data-radius="99999999" onclick="setRadius(99999999)">सर्व</button>
      </div>
    </div>
    <div class="summary"><span><b id="resultCount">0</b> मदत केंद्रे</span><span id="gpsText">GPS सुरू नाही</span></div>
    <div id="list" class="list"></div>
  </section>
</div>

<div id="helpModal" class="modal" onclick="closeModal(event)">
  <div class="modal-card">
    <h2>स्थान शेअर करा / मदत मागा</h2>
    <div class="small-note">यातून WhatsApp/फोन शेअर संदेश तयार होईल. नियंत्रण कक्ष, दिंडी प्रमुख किंवा स्वयंसेवक गट निवडा.</div>
    <input id="dindi" class="field" placeholder="दिंडी क्रमांक / नाव / मोबाईल संदर्भ" />
    <select id="issue" class="field">
      <option>वैद्यकीय आपत्कालीन मदत</option>
      <option>रुग्णवाहिका हवी</option>
      <option>पाणी हवे</option>
      <option>व्यक्ती हरवली</option>
      <option>इतर मदत</option>
    </select>
    <div class="modal-grid">
      <button class="btn btn-white" onclick="closeModal()">रद्द करा</button>
      <button class="btn btn-green" onclick="shareCurrentLocation()">शेअर करा</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const MASTER_MAP_URL = "https://www.google.com/maps/d/u/0/viewer?mid=1tI_g2pw9S8fsQ4Wfz3kPau3dbGotSuw";
const POINTS = [{"Name":"रुग्णवाहिका सेवा – गव्हाणेवस्ती","Type":"Ambulance","Latitude":18.61771,"Longitude":73.84852,"Description":"Actual vehicle/doctor/driver details not matched from MEMS deployment plan. Verify local deployment sheet before public release.","Public Label":"रुग्णवाहिका सेवा – गव्हाणेवस्ती","Verification Status":"Needs field verification","Publish Priority":"Verify before public release","Match Reason":"No matching MEMS record found","Landmark":"Gavhanevasti","Vehicle / Contact":"","Call Number":"","Phone":"","Risk zone":"","Notes":"","MEMS Deployed Place":"","MEMS Ambulance Base":"","MEMS Vehicle No":"","MEMS Type":"","MEMS EMSO/Doctor":"","MEMS Pilot/EA":"","MEMS Source Sheet":"","MEMS Source Row":"","Source":"Base support CSV + Aashadhi Wari 2026 MEMS Ambulance Deployment Plan Edited 26-6-26.xlsx","Google Maps Link":"https://www.google.com/maps/search/?api=1&query=18.61771,73.84852","label":"रुग्णवाहिका सेवा – गव्हाणेवस्ती","call":"","vehicle":"","doctor":"","pilot":"","place":"Gavhanevasti","base":"","ready":"verify","_idx":0,"Verification Status Marathi":"मैदानी पडताळणी आवश्यक"},{"Name":"रुग्णवाहिका सेवा – पालखी मार्ग वडकी | MH 14 CL 0796","Type":"Ambulance","Latitude":18.44375,"Longitude":73.9765,"Description":"Original map point: Amb 2 — Palkhi Marg Wadaki | MEMS deployed place: Palkhi Marg, Wadaki Nala, Saswad Road | Ambulance/Base: Fursungi Primary Health Center | Vehicle: MH 14 CL 0796 | Type: ALS | Date: 2026-07-11 | Time: 10:00 | EMSO/Doctor: Dr Appasaheb Jadhav (9175994947) | Pilot/EA: Devdatta Shirke (8411922611); Subhas Baravkar (9527444343) | Source sheet: On Route with Dnyaneshwar Mahar row 18 | Match note: Matched by landmark/facility name","Public Label":"रुग्णवाहिका सेवा – पालखी मार्ग वडकी | MH 14 CL 0796","Verification Status":"Matched from MEMS deployment plan","Publish Priority":"Public Ready","Match Reason":"Matched by landmark/facility name","Landmark":"Palkhi Marg Wadaki","Vehicle / Contact":"MH 14 CL 0796","Call Number":"9175994947","Phone":"9175994947","Risk zone":"","Notes":"inferred (nearest base)","MEMS Deployed Place":"Palkhi Marg, Wadaki Nala, Saswad Road","MEMS Ambulance Base":"Fursungi Primary Health Center","MEMS Vehicle No":"MH 14 CL 0796","MEMS Type":"ALS","MEMS EMSO/Doctor":"Dr Appasaheb Jadhav (9175994947)","MEMS Pilot/EA":"Devdatta Shirke (8411922611); Subhas Baravkar (9527444343)","MEMS Source Sheet":"On Route with Dnyaneshwar Mahar","MEMS Source Row":"18","Source":"Base support CSV + Aashadhi Wari 2026 MEMS Ambulance Deployment Plan Edited 26-6-26.xlsx","Google Maps Link":"https://www.google.com/maps/search/?api=1&query=18.44375,73.97650","label":"रुग्णवाहिका सेवा – पालखी मार्ग वडकी | MH 14 CL 0796","call":"9175994947","vehicle":"MH 14 CL 0796","doctor":"Dr Appasaheb Jadhav (9175994947)","pilot":"Devdatta Shirke (8411922611); Subhas Baravkar (9527444343)","place":"Palkhi Marg, Wadaki Nala, Saswad Road","base":"Fursungi Primary Health Center","ready":"ready","_idx":1,"Verification Status Marathi":"सार्वजनिक वापरासाठी तयार"}];
let map, userLocation=null, userMarker=null, markers=[], selectedCat='all', selectedRadius=500, selectedPoint=null;
POINTS.forEach((p,i)=>p._idx=i); const $=id=>document.getElementById(id);
function iconFor(p){ const t=(p.Type||'').toLowerCase(); if(t.includes('ambulance')) return '🚑'; if(t.includes('hospital')||t.includes('rural')) return '🏥'; if(t.includes('phc')||t.includes('hbt')) return '🩺'; if(t.includes('water')) return '💧'; if(t.includes('halt')||t.includes('mukkam')) return '⛺'; return '📍'; }
function clsFor(p){ const t=(p.Type||'').toLowerCase(); if(t.includes('ambulance')) return 'ambulance'; if(t.includes('hospital')||t.includes('phc')||t.includes('hbt')||t.includes('rural')) return 'health'; if(t.includes('halt')||t.includes('mukkam')) return 'halt'; if(t.includes('water')) return 'water'; return 'other'; }
function haversine(lat1,lon1,lat2,lon2){ const R=6371000, r=x=>x*Math.PI/180; const dLat=r(lat2-lat1), dLon=r(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2; return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
function fmtDist(m){ if(m==null) return '—'; return m<1000 ? Math.round(m)+' मी.' : (m/1000).toFixed(1)+' किमी'; }
function cleanTel(s){ return (s||'').toString().replace(/[^0-9+]/g,''); }
function openRoute(){ window.open(MASTER_MAP_URL,'_blank'); }
function toggleSheet(){ $('sheet').classList.toggle('expanded'); }
function setCat(cat){ selectedCat = cat; document.querySelectorAll('#categoryChips .chip').forEach(b=>b.classList.toggle('active', b.dataset.cat===cat)); refresh(); }
function setRadius(r){ selectedRadius = r; document.querySelectorAll('#radiusChips .chip').forEach(b=>b.classList.toggle('active', Number(b.dataset.radius)===r)); refresh(); }
function matchesCat(p){ const t=(p.Type||'').toLowerCase(); if(selectedCat==='all') return true; if(selectedCat==='ambulance') return t.includes('ambulance'); if(selectedCat==='doctor') return t.includes('phc') || t.includes('hbt'); if(selectedCat==='hospital') return t.includes('hospital') || t.includes('rural'); if(selectedCat==='water') return t.includes('water'); if(selectedCat==='halt') return t.includes('halt') || t.includes('mukkam'); return true; }
function matchesSearch(p){ const q=$('search').value.trim().toLowerCase(); if(!q) return true; return [p.label,p.Name,p.Type,p.Landmark,p.place,p.vehicle,p.doctor,p.pilot,p.base,p.Description].join(' ').toLowerCase().includes(q); }
function distanceFor(p){ if(!userLocation) return null; return haversine(userLocation[0], userLocation[1], p.Latitude, p.Longitude); }
function directionsUrl(p){ return `https://www.google.com/maps/dir/?api=1&destination=${p.Latitude},${p.Longitude}`; }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function popupHtml(p){ const call=cleanTel(p.call); const meta=[]; if(p.vehicle) meta.push(`<b>वाहन क्रमांक:</b> ${esc(p.vehicle)}`); if(p.doctor) meta.push(`<b>डॉक्टर/EMSO:</b> ${esc(p.doctor)}`); if(p.base) meta.push(`<b>बेस:</b> ${esc(p.base)}`); if(p.place) meta.push(`<b>ठिकाण:</b> ${esc(p.place)}`); return `<b>${iconFor(p)} ${esc(p.label)}</b><br>${meta.join('<br>')}<br><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">${call?`<a href="tel:${call}">फोन करा</a>`:''}<a target="_blank" href="${directionsUrl(p)}">दिशा</a></div>`; }
function drawMarkers(points){ markers.forEach(m=>map.removeLayer(m)); markers=[]; points.forEach(p=>{ const c=clsFor(p); const m=L.marker([p.Latitude,p.Longitude],{icon:L.divIcon({className:'',html:`<div class="pin ${c}">${iconFor(p)}</div>`,iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map).bindPopup(popupHtml(p)); markers.push(m); }); }
function visiblePoints(){ let pts=POINTS.filter(p=>matchesCat(p)&&matchesSearch(p)).map(p=>({...p, dist:distanceFor(p)})); if(userLocation && selectedRadius < 99999999) pts=pts.filter(p=>p.dist!=null && p.dist<=selectedRadius); if(userLocation) pts.sort((a,b)=>(a.dist??999999999)-(b.dist??999999999)); else pts.sort((a,b)=>(a.Type||'').localeCompare(b.Type||'') || (a.label||'').localeCompare(b.label||'')); return pts; }
function refresh(){ const pts=visiblePoints(); $('resultCount').textContent = pts.length; $('gpsText').textContent = userLocation ? 'अंतरानुसार क्रम' : 'अंतर पाहण्यासाठी माझ्या जवळ टॅप करा'; $('mapStatus').textContent = userLocation ? `${pts.length} जवळची मदत केंद्रे दाखवत आहोत` : 'सध्याचे स्थान वापरण्यासाठी 📍 माझ्या जवळ टॅप करा'; drawMarkers(pts.slice(0, 120)); renderList(pts.slice(0, 60)); }
function detailLine(label,value){ return value ? `<div><strong>${esc(label)}</strong> ${esc(value)}</div>` : ''; }
function renderList(pts){ const list=$('list'); if(!pts.length){ list.innerHTML='<div class="empty">या फिल्टरमध्ये कोणतेही मदत केंद्र सापडले नाही. सर्व निवडा किंवा अंतर वाढवा.</div>'; return; } list.innerHTML=pts.map(p=>{ const c=clsFor(p), call=cleanTel(p.call), dist=fmtDist(p.dist), near=p.dist!=null&&p.dist<=100, verify=p.ready==='verify'; return `<article class="card ${c}">
      <div class="card-top"><div class="ico">${iconFor(p)}</div><div style="min-width:0;flex:1"><h3 class="card-title">${esc(p.label)}</h3><div class="badges"><span class="badge ${verify?'red':'green'}">${verify?'पडताळणी आवश्यक':'सार्वजनिक तयार'}</span>${p['MEMS Type']?`<span class="badge">${esc(p['MEMS Type'])}</span>`:''}${p['Risk zone']?`<span class="badge red">${esc(p['Risk zone'])}</span>`:''}</div></div><div class="dist ${near?'near':''}">${dist}</div></div>
      <div class="meta">${detailLine('ठिकाण:',p.place)}${detailLine('वाहन क्रमांक:',p.vehicle)}${detailLine('डॉक्टर/EMSO:',p.doctor)}${detailLine('बेस:',p.base)}${detailLine('पायलट/EA:',p.pilot)}</div>
      <div class="actions">${call?`<a class="call" href="tel:${call}">📞 फोन करा</a>`:`<button disabled>📞 नंबर नाही</button>`}<a class="dir" target="_blank" href="${directionsUrl(p)}">🧭 दिशा</a><button class="share" onclick="openShareByIndex(${p._idx})">📤 शेअर</button></div>
    </article>`; }).join(''); }
function locateMe(){ if(!navigator.geolocation){ $('mapStatus').textContent='या फोन/ब्राउझरमध्ये स्थान सुविधा उपलब्ध नाही'; return; } $('mapStatus').textContent='GPS स्थान घेत आहोत…'; navigator.geolocation.getCurrentPosition(pos=>{ userLocation=[pos.coords.latitude,pos.coords.longitude]; if(userMarker) map.removeLayer(userMarker); userMarker=L.marker(userLocation,{icon:L.divIcon({className:'',html:'<div class="user-pin"></div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map).bindPopup('आपण येथे आहात').openPopup(); map.setView(userLocation,16); $('mapStatus').textContent=`GPS सुरू आहे. अचूकता सुमारे ${Math.round(pos.coords.accuracy)} मी.`; $('gpsText').textContent=`अचूकता ${Math.round(pos.coords.accuracy)} मी.`; refresh(); }, err=>{ $('mapStatus').textContent='GPS मिळाले नाही. Location permission द्या किंवा शोध वापरा.'; }, {enableHighAccuracy:true,timeout:15000,maximumAge:20000}); }
function openShareByIndex(idx){ const p=POINTS[idx]; selectedPoint = p ? p.label : null; $('helpModal').classList.add('open'); setTimeout(()=>$('dindi').focus(),100); }
function openShare(label){ selectedPoint = label || null; $('helpModal').classList.add('open'); setTimeout(()=>$('dindi').focus(),100); }
function closeModal(e){ if(!e || e.target.id==='helpModal' || e.target.classList.contains('btn-white')) $('helpModal').classList.remove('open'); }
function shareCurrentLocation(){ const d=$('dindi').value.trim(); const issue=$('issue').value; const loc = userLocation ? `https://www.google.com/maps/search/?api=1&query=${userLocation[0]},${userLocation[1]}` : 'स्थान उपलब्ध नाही'; const msg = `वारी मदत विनंती%0A${encodeURIComponent(issue)}%0A${d?encodeURIComponent('दिंडी/नाव: '+d)+'%0A':''}${selectedPoint?encodeURIComponent('जवळचे मदत केंद्र: '+selectedPoint)+'%0A':''}${encodeURIComponent('माझे स्थान: ')}${encodeURIComponent(loc)}`; const text=decodeURIComponent(msg.replaceAll('%0A','\n')); if(navigator.share){ navigator.share({title:'वारी मदत विनंती', text}).catch(()=>{}); } else { window.open('https://wa.me/?text='+msg,'_blank'); } closeModal(); }
function init(){ map=L.map('map',{zoomControl:false}).setView([18.419360226796154,74.02765555],10); L.control.zoom({position:'bottomleft'}).addTo(map); L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map); refresh(); setTimeout(()=>{ if(markers.length){ const group=L.featureGroup(markers); map.fitBounds(group.getBounds().pad(0.12)); } },250); }
init();
</script>
